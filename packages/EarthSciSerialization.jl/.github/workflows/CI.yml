name: CI
on:
  push:
    branches:
      - main
      - master
    tags: ['*']
  pull_request:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'  # Latest stable
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: packages/EarthSciSerialization.jl
      - uses: julia-actions/julia-runtest@v1
        with:
          project: packages/EarthSciSerialization.jl
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: packages/EarthSciSerialization.jl/src
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Configure doc environment
        shell: julia --project=packages/EarthSciSerialization.jl/docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd() * "/packages/EarthSciSerialization.jl"))
          Pkg.instantiate()
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: packages/EarthSciSerialization.jl
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          install-package: false
          project: packages/EarthSciSerialization.jl
      - name: Run doctests
        shell: julia --project=packages/EarthSciSerialization.jl/docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using EarthSciSerialization
          DocMeta.setdocmeta!(EarthSciSerialization, :DocTestSetup, :(using EarthSciSerialization); recursive=true)
          doctest(EarthSciSerialization)