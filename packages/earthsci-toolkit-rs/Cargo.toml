[package]
name = "earthsci-toolkit"
version = "0.0.2"
edition = "2024"
rust-version = "1.85.0"
authors = ["EarthSciML Authors and Contributors"]
description = "Rust implementation of EarthSciML Serialization Format"
license = "MIT"
repository = "https://github.com/ctessum/EarthSciSerialization"
documentation = "https://docs.rs/earthsci-toolkit"
keywords = ["earth-science", "modeling", "serialization", "json"]
categories = ["science", "parsing", "simulation"]
readme = "README.md"

# Support both library and CLI binary
[[bin]]
name = "esm"
path = "src/bin/esm.rs"

[lib]
name = "earthsci_toolkit"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
jsonschema = { version = "0.19", default-features = false }
thiserror = "2.0"
indexmap = { version = "2", features = ["serde"] }
clap = { version = "4.0", features = ["derive"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", optional = true }
# Performance dependencies
rayon = { version = "1.8", optional = true }
simd-json = { version = "0.13", optional = true }
smallvec = { version = "1.11", features = ["serde"] }
bumpalo = { version = "3.14", optional = true }
wide = { version = "0.7", optional = true }
bytemuck = { version = "1.14", optional = true }
criterion = { version = "0.5", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }

# Native-only ODE simulation backend (gt-5ws). diffsol's default features are
# `["nalgebra", "faer"]`; we keep both because diffsol 0.11.0's lib.rs has
# unconditional `pub use` statements that reference the nalgebra modules even
# when the nalgebra feature is disabled (so `default-features = false` fails
# to compile). The simulate module always selects FaerMat / FaerLU at the
# call site, so we still get the faer code path; nalgebra is just along for
# the ride at compile time. We exclude the heavyweight optional features
# (LLVM / Cranelift / DiffSL / CUDA / SuiteSparse / Sundials).
#
# Gated to non-wasm targets so the WASM build (which has its own follow-up
# bead for simulate exposure) does not pull diffsol in.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
diffsol = "0.11"

[dev-dependencies]
serde_test = "1.0"
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.4"
tempfile = "3.10"

[[bench]]
name = "benchmarks"
harness = false
required-features = ["benchmarks"]

[features]
default = ["cli"]
cli = ["clap"]
wasm = ["wasm-bindgen", "serde-wasm-bindgen", "js-sys", "web-sys"]
# Performance features
parallel = ["rayon"]
simd = ["wide", "bytemuck"]
zero_copy = ["simd-json"]
custom_alloc = ["bumpalo"]
benchmarks = ["criterion"]
performance = ["parallel", "simd", "zero_copy", "custom_alloc"]

# WASM target configuration
[package.metadata.wasm-pack.profile.release]
