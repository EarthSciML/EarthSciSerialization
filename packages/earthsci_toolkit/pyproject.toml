[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "earthsci-toolkit"
version = "0.6.0"
description = "Earth System Model Serialization Format"
authors = [
    {name = "EarthSciML Authors and Contributors"}
]
readme = "README.md"
keywords = ["earth-science", "modeling", "serialization", "atmospheric-chemistry", "climate"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Atmospheric Science",
    "Topic :: Scientific/Engineering :: Chemistry",
]
license = {file = "LICENSE"}
requires-python = ">=3.9"

dependencies = [
    "jsonschema>=4.0",
    "sympy>=1.9",
    "pint>=0.20",
    "numpy>=1.20",
    "scipy>=1.7",
    "matplotlib>=3.5",
    "xarray>=0.20",
    "netcdf4>=1.5",
]

[project.urls]
Homepage = "https://github.com/ctessum/EarthSciSerialization"
Repository = "https://github.com/ctessum/EarthSciSerialization.git"
Documentation = "https://github.com/ctessum/EarthSciSerialization#readme"
Issues = "https://github.com/ctessum/EarthSciSerialization/issues"

[project.scripts]
esm-migrate = "earthsci_toolkit.cli.migrate:main"
earthsci-determinism-adapter-python = "earthsci_toolkit.cli.determinism_adapter:main"
earthsci-cadence-adapter-python = "earthsci_toolkit.cli.cadence_adapter:main"

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "pytest-cov>=3.0",
    "black>=22.0",
    "flake8>=4.0",
    "mypy>=0.990",
    "build>=0.8",
    "twine>=4.0",
]
test = [
    "pytest>=6.0",
    "pytest-cov>=3.0",
    # Required for jsonschema FormatChecker to validate date-time and uri formats
    "rfc3339-validator",
    "rfc3986-validator",
    # Property-based / fuzz testing (gt-72z)
    "hypothesis>=6.0",
]
# Analytics/performance monitoring. The `esm-monitoring` companion package
# lives in this repo at `../../monitoring/` and is not yet published to PyPI.
# To enable analytics locally, install it alongside this package:
#
#     pip install -e ../../monitoring
#     pip install -e packages/earthsci_toolkit[monitoring]
#
# The earthsci_toolkit binding imports monitoring lazily with a no-op fallback,
# so this extra is currently a documented marker rather than a hard requirement.
# Once `esm-monitoring` is on PyPI, list it here.
monitoring = []
# Conservative-regridding geometry kernel (RFC semiring-faq-unified-ir §8.1 /
# Appendix B.2; bead ess-my4.4.4). The `intersect_polygon` leaf's spherical /
# geodesic manifolds clip on the sphere via `spherely` (vectorized S2 bindings
# over s2geography). `spherely` is PRE-1.0 — its Python API still moves between
# releases — so it is PINNED here and imported lazily by
# `earthsci_toolkit.geometry`; the stable surface beneath it is the
# s2geography / s2geometry C++ API. Track spherely releases and bump this pin
# deliberately. The `planar` manifold needs no backend (numpy-only
# Sutherland–Hodgman), so the rest of the toolkit never requires this extra.
geometry = [
    "spherely==0.1.0",
]
[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.package-data]
earthsci_toolkit = ["data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = ["src"]