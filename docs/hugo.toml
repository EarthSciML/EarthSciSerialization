baseURL = "https://earthsciml.github.io/EarthSciSerialization/"
languageCode = "en-us"
title = "ESM Format Documentation"
# No theme — layouts are provided directly under layouts/.

# Use docs/ as the site root when building from this repo.
# CI invokes `hugo --source docs --minify --destination public`.

enableGitInfo = true
enableRobotsTXT = true

[params]
  description = "Complete documentation for the EarthSciML Serialization Format."
  repoURL = "https://github.com/EarthSciML/EarthSciSerialization"

[markup]
  [markup.goldmark.renderer]
    # Allow raw HTML in generated markdown (<details>, <img>, <figure>).
    unsafe = true
  # Pass math delimiters through untouched so Goldmark does not mangle LaTeX
  # (underscores as emphasis, `\_` -> `_`, etc.). KaTeX auto-render then picks
  # up the raw `$$...$$` / `\(...\)` delimiters in the final HTML.
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [["\\[", "\\]"], ["$$", "$$"]]
      inline = [["\\(", "\\)"]]
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true

[outputs]
  home = ["HTML"]
  section = ["HTML"]
