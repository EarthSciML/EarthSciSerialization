name: Release Publish

# Consolidated release/publish workflow (gt-567, phase 2 of gt-9ju).
# Absorbs the publish/release jobs previously living in per-language CI files:
#   python-package.yml, julia-ci.yml, rust-ci.yml, go-ci.yml, npm-publish.yml.
# Test matrices from those files were absorbed earlier by gt-9ju into
# conformance-testing.yml; only publish/release logic is handled here.

on:
  release:
    types: [ published ]
  push:
    tags: [ 'v*' ]

jobs:
  # ---------------------------------------------------------------------------
  # Python: build + publish to TestPyPI and PyPI.
  # Both publish jobs are currently disabled (if: false) per gt-0w4 — TestPyPI
  # trusted publisher is not configured. Re-enable by restoring the original
  # condition once trusted publishing is set up.
  # ---------------------------------------------------------------------------
  python-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          cd packages/earthsci_toolkit
          python -m build

      - name: Check package
        run: |
          cd packages/earthsci_toolkit
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: packages/earthsci_toolkit/dist/

  python-publish-testpypi:
    name: Publish to TestPyPI
    needs: python-build
    runs-on: ubuntu-latest
    # Disabled (2026-04-11, gt-0w4): not ready to publish anything yet. TestPyPI
    # trusted publisher is not configured for this repo, so the job fails with
    # invalid-publisher on every push. Re-enable by restoring the original
    # condition once we're ready to publish and the trusted publisher is set up.
    if: false
    environment:
      name: testpypi
      url: https://test.pypi.org/p/earthsci-toolkit
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  python-publish-pypi:
    name: Publish to PyPI
    needs: python-build
    runs-on: ubuntu-latest
    # Disabled (2026-04-11, gt-0w4): not ready to publish anything yet. Re-enable
    # by restoring the original condition once we're ready to release to PyPI and
    # the trusted publisher is configured.
    if: false
    environment:
      name: pypi
      url: https://pypi.org/p/earthsci-toolkit
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---------------------------------------------------------------------------
  # Julia: register new version with the General registry.
  # ---------------------------------------------------------------------------
  julia-register:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Update version in Project.toml
        working-directory: packages/EarthSciSerialization.jl
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" Project.toml
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Project.toml
          git commit -m "Update version to $VERSION" || true

      - name: Register with General Registry
        uses: julia-actions/RegisterAction@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          registry: General
          package_dir: packages/EarthSciSerialization.jl

      - name: Tag Julia package
        working-directory: packages/EarthSciSerialization.jl
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          git tag -a "EarthSciSerialization-v$VERSION" -m "EarthSciSerialization v$VERSION"
          git push origin "EarthSciSerialization-v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Rust: publish to crates.io and attach cross-platform binaries.
  # ---------------------------------------------------------------------------
  rust-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update version in Cargo.toml
        working-directory: packages/earthsci-toolkit-rs
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          cargo update -p earthsci-toolkit --precise $VERSION

      - name: Build for release
        working-directory: packages/earthsci-toolkit-rs
        run: cargo build --release --all-features

      - name: Publish to crates.io
        working-directory: packages/earthsci-toolkit-rs
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Build binary assets
        working-directory: packages/earthsci-toolkit-rs
        run: |
          rustup target add x86_64-unknown-linux-gnu
          rustup target add x86_64-apple-darwin
          rustup target add x86_64-pc-windows-gnu

          cargo build --release --target x86_64-unknown-linux-gnu --bin esm
          cargo build --release --target x86_64-apple-darwin --bin esm
          cargo build --release --target x86_64-pc-windows-gnu --bin esm

          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/esm dist/esm-linux-x86_64
          cp target/x86_64-apple-darwin/release/esm dist/esm-macos-x86_64
          cp target/x86_64-pc-windows-gnu/release/esm.exe dist/esm-windows-x86_64.exe

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: packages/earthsci-toolkit-rs/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Go: cross-platform binaries + module tagging / index trigger.
  # ---------------------------------------------------------------------------
  go-build-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Update version
        working-directory: packages/esm-format-go
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Building version: $VERSION"
          sed -i "s/Version = \"[^\"]*\"/Version = \"$VERSION\"/" pkg/esm/version.go 2>/dev/null || true

      - name: Build for multiple platforms
        working-directory: packages/esm-format-go
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -o esm-go-linux-amd64 ./main.go
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -o esm-go-darwin-amd64 ./main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.Version=$VERSION" -o esm-go-darwin-arm64 ./main.go
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -o esm-go-windows-amd64.exe ./main.go

      - name: Create release assets
        working-directory: packages/esm-format-go
        run: |
          mkdir -p dist
          mv esm-go-* dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: packages/esm-format-go/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  go-publish-module:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Tag Go module
        working-directory: packages/esm-format-go
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "esm-format-go/v$VERSION" -m "Go module v$VERSION"
          git push origin "esm-format-go/v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GOPROXY
        run: echo "GOPROXY=https://proxy.golang.org,direct" >> $GITHUB_ENV

      - name: Trigger module indexing
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          MODULE_PATH="github.com/ctessum/EarthSciSerialization/packages/esm-format-go"
          curl -X GET "https://proxy.golang.org/$MODULE_PATH/@v/v$VERSION.info" || true

  # ---------------------------------------------------------------------------
  # npm: publish stable on v* tags, publish beta on any tag / release event.
  # ---------------------------------------------------------------------------
  npm-publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: packages/earthsci-toolkit/package-lock.json

      - name: Install dependencies
        working-directory: packages/earthsci-toolkit
        run: npm ci

      - name: Build package
        working-directory: packages/earthsci-toolkit
        run: npm run build

      - name: Publish to NPM
        working-directory: packages/earthsci-toolkit
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-publish-beta:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: packages/earthsci-toolkit/package-lock.json

      - name: Install dependencies
        working-directory: packages/earthsci-toolkit
        run: npm ci

      - name: Build package
        working-directory: packages/earthsci-toolkit
        run: npm run build

      - name: Update version to beta
        working-directory: packages/earthsci-toolkit
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          BETA_VERSION="${CURRENT_VERSION}-beta.$(date +%s)"
          npm version $BETA_VERSION --no-git-tag-version
          echo "Publishing version: $BETA_VERSION"

      - name: Publish beta to NPM
        working-directory: packages/earthsci-toolkit
        run: npm publish --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
