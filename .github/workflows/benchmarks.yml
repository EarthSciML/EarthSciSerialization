name: Python Performance Benchmarks

# Runs the conformance test suite with the `monitoring` companion package
# installed and analytics collection enabled, then uploads the resulting
# SQLite analytics database as an artifact. Never blocks merges.

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/earthsci_toolkit/**'
      - 'monitoring/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/benchmarks.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    defaults:
      run:
        working-directory: packages/earthsci_toolkit
    env:
      PYTHON_VERSION: '3.11'
      ESM_ANALYTICS_ENABLED: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-benchmarks-${{ hashFiles('packages/earthsci_toolkit/pyproject.toml', 'monitoring/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-benchmarks-

      - name: Install monitoring companion + earthsci-toolkit
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../monitoring
          pip install -e .[dev,test,monitoring]

      - name: Run test suite with analytics enabled
        run: |
          pytest tests/ -q --no-header || true

      - name: Summarize analytics DB
        run: |
          python - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          db = Path.home() / ".esm_analytics" / "analytics.db"
          if not db.exists():
              print("No analytics DB produced — monitoring may not have been wired.")
              raise SystemExit(0)

          conn = sqlite3.connect(db)
          cur = conn.cursor()

          summary = {}
          cur.execute(
              "SELECT operation, COUNT(*), AVG(duration_ms), MAX(duration_ms) "
              "FROM performance_metrics GROUP BY operation"
          )
          summary["performance_by_operation"] = [
              {
                  "operation": row[0],
                  "count": row[1],
                  "avg_duration_ms": row[2],
                  "max_duration_ms": row[3],
              }
              for row in cur.fetchall()
          ]

          cur.execute("SELECT COUNT(*) FROM usage_events")
          summary["usage_event_count"] = cur.fetchone()[0]

          out = Path("benchmark-summary.json")
          out.write_text(json.dumps(summary, indent=2))
          print(out.read_text())
          PY

      - name: Stage artifacts
        run: |
          mkdir -p benchmark-artifacts
          cp -f benchmark-summary.json benchmark-artifacts/ 2>/dev/null || true
          if [ -f "$HOME/.esm_analytics/analytics.db" ]; then
            cp "$HOME/.esm_analytics/analytics.db" benchmark-artifacts/
          fi
          ls -la benchmark-artifacts/

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-benchmarks-${{ github.run_number }}
          path: packages/earthsci_toolkit/benchmark-artifacts/
          retention-days: 90
