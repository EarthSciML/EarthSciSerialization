name: Cross-Language Conformance Testing

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/conformance-testing.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/conformance-testing.yml'
  workflow_dispatch:  # Allow manual triggering
    inputs:
      run_performance_analysis:
        description: 'Run detailed performance analysis'
        required: false
        default: 'true'
        type: boolean

env:
  # Consistent versions across jobs
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  JULIA_VERSION: '1.10'
  RUST_VERSION: 'stable'
  # Resource limits for conformance testing
  CONFORMANCE_MEMORY_LIMIT: '4g'
  CONFORMANCE_CPU_LIMIT: '2.0'
  CONFORMANCE_TIMEOUT: '300s'

jobs:
  # Run each language's individual tests first.
  # Matrices absorbed from the per-language CI workflows (gt-9ju):
  #   python-package.yml, rust-ci.yml, julia-ci.yml, go-ci.yml, npm-publish.yml
  julia-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11', '1.12']
    defaults:
      run:
        working-directory: packages/EarthSciSerialization.jl
    steps:
      - uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Install Julia dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Run Julia tests (with coverage)
        run: |
          julia --project=. -e 'using Pkg; Pkg.test(coverage=true)'

      - name: Process Julia coverage
        uses: julia-actions/julia-processcoverage@v1
        if: matrix.julia-version == '1.12'
        with:
          directories: packages/EarthSciSerialization.jl/src

      - name: Upload Julia coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.julia-version == '1.12'
        with:
          files: lcov.info
          flags: julia

  typescript-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: packages/earthsci-toolkit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: packages/earthsci-toolkit/package-lock.json

      - name: Install TypeScript dependencies
        run: npm ci

      - name: Build TypeScript package
        run: npm run build

      - name: Run TypeScript tests
        run: npm run test:ci

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: packages/earthsci_toolkit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('packages/earthsci_toolkit/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest pytest-cov flake8
          pip install -e .[dev,test]

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

      - name: Run Python tests (with coverage)
        run: |
          pytest tests/ -v --cov=src/earthsci_toolkit --cov-report=xml

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: packages/earthsci_toolkit/coverage.xml
          flags: python

  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: ['stable', 'beta', '1.88.0']  # 1.88.0 = MSRV
    defaults:
      run:
        working-directory: packages/earthsci-toolkit-rs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/earthsci-toolkit-rs/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('packages/earthsci-toolkit-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Rust library
        run: cargo build --verbose

      - name: Build CLI binary
        run: cargo build --bin esm --verbose

      - name: Install wasm32 target
        if: matrix.rust == 'stable'
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM
        if: matrix.rust == 'stable'
        env:
          RUSTFLAGS: --cfg getrandom_backend="wasm_js"
        run: cargo build --target wasm32-unknown-unknown --features wasm --verbose

      - name: Run Rust tests
        run: cargo test --verbose --all-features

      - name: Generate Rust documentation
        if: matrix.rust == 'stable'
        run: cargo doc --no-deps --all-features

  go-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    defaults:
      run:
        working-directory: packages/esm-format-go
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('packages/esm-format-go/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download Go dependencies
        run: go mod download

      - name: Verify Go dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.go-version == '1.23'
        with:
          files: packages/esm-format-go/coverage.out
          flags: go

      - name: Build Go binary
        run: go build -v ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        if: matrix.go-version == '1.23'
        with:
          version: latest
          working-directory: packages/esm-format-go

  # Cross-language conformance testing — only runs if all per-language suites pass
  standard-conformance-testing:
    runs-on: ubuntu-latest
    needs: [julia-tests, typescript-tests, python-tests, rust-tests, go-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ env.JULIA_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/earthsci-toolkit/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia
            ~/.cache/pip
            ~/.cargo/registry
            ~/.cargo/git
            packages/earthsci-toolkit-rs/target
            packages/earthsci-toolkit/node_modules
          key: ${{ runner.os }}-conformance-${{ hashFiles('packages/*/Project.toml', 'packages/*/package*.json', 'packages/*/pyproject.toml', 'packages/*/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-conformance-

      # Install dependencies for all languages
      - name: Install Julia dependencies
        working-directory: packages/EarthSciSerialization.jl
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Install TypeScript dependencies and build
        working-directory: packages/earthsci-toolkit
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        working-directory: packages/earthsci_toolkit
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,test]

      - name: Build Rust package
        working-directory: packages/earthsci-toolkit-rs
        run: |
          cargo build --release

      # Make scripts executable
      - name: Make conformance scripts executable
        run: |
          chmod +x scripts/test-conformance.sh
          chmod +x scripts/run-julia-conformance.jl
          chmod +x scripts/run-typescript-conformance.js
          chmod +x scripts/run-python-conformance.py

      # Run standard cross-language conformance testing
      - name: Run standard conformance tests
        run: |
          ./scripts/test-conformance.sh

      # Upload conformance results (best-effort — partial output is useful for debugging)
      - name: Upload standard conformance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-results-${{ github.run_number }}
          path: |
            conformance-results/
          retention-days: 30

  # Performance analysis job
  performance-analysis:
    runs-on: ubuntu-latest
    if: github.event.inputs.run_performance_analysis != 'false'
    needs: [standard-conformance-testing]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install performance analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib seaborn plotly pandas numpy scipy

      - name: Download conformance results
        uses: actions/download-artifact@v4
        with:
          name: conformance-results-${{ github.run_number }}
          path: conformance-results/

      - name: Run performance analysis
        run: |
          python3 -c "
          import json
          import os
          from pathlib import Path

          # Load performance data
          performance_file = Path('conformance-results/performance_summary.json')
          if performance_file.exists():
              with open(performance_file) as f:
                  data = json.load(f)

              print('=== PERFORMANCE ANALYSIS SUMMARY ===')
              print(f'Analysis completed at: {data.get(\"timestamp\", \"unknown\")}')

              languages = data.get('languages', {})
              if languages:
                  # Find fastest and slowest
                  exec_times = {lang: info.get('execution_time_ms', 0) for lang, info in languages.items()}
                  fastest = min(exec_times, key=exec_times.get) if exec_times else 'unknown'
                  slowest = max(exec_times, key=exec_times.get) if exec_times else 'unknown'

                  print(f'Fastest implementation: {fastest} ({exec_times.get(fastest, 0):.1f}ms)')
                  print(f'Slowest implementation: {slowest} ({exec_times.get(slowest, 0):.1f}ms)')

                  # Memory usage
                  mem_usage = {lang: info.get('memory_peak_mb', 0) for lang, info in languages.items()}
                  lowest_mem = min(mem_usage, key=mem_usage.get) if mem_usage else 'unknown'
                  highest_mem = max(mem_usage, key=mem_usage.get) if mem_usage else 'unknown'

                  print(f'Lowest memory usage: {lowest_mem} ({mem_usage.get(lowest_mem, 0):.1f}MB)')
                  print(f'Highest memory usage: {highest_mem} ({mem_usage.get(highest_mem, 0):.1f}MB)')
          else:
              print('No performance data available')
          "

      - name: Upload performance analysis
        uses: actions/upload-artifact@v4
        with:
          name: performance-analysis-${{ github.run_number }}
          path: |
            conformance-results/performance_summary.json
          retention-days: 90

  # Report aggregation and final status
  conformance-results:
    runs-on: ubuntu-latest
    needs: [standard-conformance-testing]
    if: always()
    steps:
      - uses: actions/checkout@v4

      # Download all results
      - name: Download standard conformance results
        uses: actions/download-artifact@v4
        with:
          name: conformance-results-${{ github.run_number }}
          path: standard-results/
        continue-on-error: true

      # Comment on PR with conformance results
      - name: Comment PR with enhanced conformance results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            try {
              let analysisPath = 'standard-results/comparison/analysis.json';
              let analysisType = 'Standard';

              if (fs.existsSync(analysisPath)) {
                const analysis = JSON.parse(fs.readFileSync(analysisPath, 'utf8'));

                const overallStatus = analysis.overall_status || 'UNKNOWN';
                const overallScore = analysis.divergence_summary?.overall_score || 0;
                const languagesTested = analysis.languages_tested || [];
                const criticalDivergences = analysis.divergence_summary?.critical_divergences || [];

                let statusEmoji = '❓';
                if (overallStatus === 'PASS') statusEmoji = '✅';
                else if (overallStatus === 'WARN') statusEmoji = '⚠️';
                else if (overallStatus === 'FAIL') statusEmoji = '❌';

                let comment = `## ${statusEmoji} ${analysisType} Cross-Language Conformance Test Results\n\n`;
                comment += `**Overall Status:** ${overallStatus}\n`;
                comment += `**Consistency Score:** ${(overallScore * 100).toFixed(1)}%\n`;
                comment += `**Languages Tested:** ${languagesTested.join(', ')}\n`;
                comment += `**Critical Divergences:** ${criticalDivergences.length}\n\n`;

                // Performance summary if available
                if (analysis.performance_analysis && analysis.performance_analysis.execution_time_stats) {
                  const perf = analysis.performance_analysis.execution_time_stats;
                  comment += `### Performance Summary:\n`;
                  comment += `- **Fastest:** ${perf.fastest_language}\n`;
                  comment += `- **Slowest:** ${perf.slowest_language}\n`;

                  if (analysis.performance_analysis.memory_usage_stats) {
                    const mem = analysis.performance_analysis.memory_usage_stats;
                    comment += `- **Lowest Memory:** ${mem.lowest_memory_language}\n`;
                    comment += `- **Highest Memory:** ${mem.highest_memory_language}\n`;
                  }
                  comment += '\n';
                }

                if (criticalDivergences.length > 0) {
                  comment += `### Critical Divergences (< 70% consistency):\n`;
                  for (const divergence of criticalDivergences) {
                    comment += `- **${divergence.category}**: ${(divergence.score * 100).toFixed(1)}% consistency\n`;
                  }
                  comment += '\n';
                }

                comment += `### Category Results:\n`;
                const categories = analysis.divergence_summary?.categories || {};
                for (const [category, data] of Object.entries(categories)) {
                  const statusIcon = data.status === 'PASS' ? '✅' : data.status === 'WARN' ? '⚠️' : '❌';
                  comment += `- ${statusIcon} **${category.charAt(0).toUpperCase() + category.slice(1)}**: ${(data.consistency_score * 100).toFixed(1)}% (${data.divergent_tests}/${data.total_tests} divergent)\n`;
                }

                comment += `\n📊 [View detailed conformance report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              } else {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '❌ Cross-language conformance testing failed - no results generated. Check the action logs for details.'
                });
              }
            } catch (error) {
              console.error('Error posting conformance results:', error);
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `❌ Error processing conformance test results: ${error.message}`
              });
            }

      # Final status check
      - name: Check final conformance status
        run: |
          ANALYSIS_FILE=""
          if [ -f "standard-results/comparison/analysis.json" ]; then
            ANALYSIS_FILE="standard-results/comparison/analysis.json"
            echo "Using standard analysis results"
          fi

          if [ -n "$ANALYSIS_FILE" ]; then
            OVERALL_STATUS=$(python3 -c "import json; data=json.load(open('$ANALYSIS_FILE')); print(data.get('overall_status', 'UNKNOWN'))")
            CONSISTENCY_SCORE=$(python3 -c "import json; data=json.load(open('$ANALYSIS_FILE')); print(data.get('divergence_summary', {}).get('overall_score', 0))")

            echo "Overall conformance status: $OVERALL_STATUS"
            echo "Consistency score: $(python3 -c "print(f'{float('$CONSISTENCY_SCORE') * 100:.1f}%')")"

            case "$OVERALL_STATUS" in
              "PASS")
                echo "✅ Conformance tests passed - all implementations are consistent"
                exit 0
                ;;
              "WARN")
                echo "⚠️ Conformance tests passed with warnings - some minor divergences detected"
                exit 0
                ;;
              "FAIL")
                echo "❌ Conformance tests failed - implementations have significant divergences"
                exit 1
                ;;
              *)
                echo "❓ Conformance test status unknown"
                exit 1
                ;;
            esac
          else
            echo "❌ No conformance analysis results found"
            exit 1
          fi