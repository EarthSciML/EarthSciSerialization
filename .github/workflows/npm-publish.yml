name: NPM Package Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: packages/earthsci-toolkit/package-lock.json

    - name: Install dependencies
      working-directory: packages/earthsci-toolkit
      run: npm ci

    - name: Run tests
      working-directory: packages/earthsci-toolkit
      run: npm run test:ci

    - name: Build package
      working-directory: packages/earthsci-toolkit
      run: npm run build

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        cache-dependency-path: packages/earthsci-toolkit/package-lock.json

    - name: Install dependencies
      working-directory: packages/earthsci-toolkit
      run: npm ci

    - name: Build package
      working-directory: packages/earthsci-toolkit
      run: npm run build

    - name: Publish to NPM
      working-directory: packages/earthsci-toolkit
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm-beta:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        cache-dependency-path: packages/earthsci-toolkit/package-lock.json

    - name: Install dependencies
      working-directory: packages/earthsci-toolkit
      run: npm ci

    - name: Build package
      working-directory: packages/earthsci-toolkit
      run: npm run build

    - name: Update version to beta
      working-directory: packages/earthsci-toolkit
      run: |
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        BETA_VERSION="${CURRENT_VERSION}-beta.$(date +%s)"
        npm version $BETA_VERSION --no-git-tag-version
        echo "Publishing version: $BETA_VERSION"

    - name: Publish beta to NPM
      working-directory: packages/earthsci-toolkit
      run: npm publish --tag beta
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}