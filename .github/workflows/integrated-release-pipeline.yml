name: Integrated Release Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
    - 'workspace.json'
    - 'COMPATIBILITY.md'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
        - major
        - minor
        - patch
        - prerelease
      prerelease_type:
        description: 'Prerelease type (only if prerelease selected)'
        required: false
        default: 'rc'
        type: choice
        options:
        - alpha
        - beta
        - rc
      force_release:
        description: 'Force release even if no package changes detected'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}

jobs:
  # Analyze what needs to be released
  release-analysis:
    runs-on: ubuntu-latest
    outputs:
      needs_release: ${{ steps.analysis.outputs.needs_release }}
      version_bump: ${{ steps.analysis.outputs.version_bump }}
      changed_packages: ${{ steps.analysis.outputs.changed_packages }}
      new_version: ${{ steps.analysis.outputs.new_version }}
      release_notes: ${{ steps.analysis.outputs.release_notes }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Lowercase registry namespace
      run: echo "NAMESPACE=${NAMESPACE,,}" >> $GITHUB_ENV

    - name: Release analysis
      id: analysis
      run: |
        # Get last release tag
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Last tag: $LAST_TAG"

        # Determine a valid git ref for diff/log commands
        # When no tags exist, LAST_TAG is "v0.0.0" which isn't a real ref
        if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
          LAST_REF="$LAST_TAG"
        else
          # Use the repo's initial commit so diffs cover the full history
          LAST_REF=$(git rev-list --max-parents=0 HEAD | head -1)
          echo "No existing tag found, using initial commit: $LAST_REF"
        fi

        # Check for changes in package directories since last tag
        CHANGED_PACKAGES='[]'
        NEEDS_RELEASE="false"

        if [ "${{ github.event.inputs.force_release }}" = "true" ]; then
          NEEDS_RELEASE="true"
          CHANGED_PACKAGES='["EarthSciSerialization.jl", "earthsci-toolkit", "earthsci_toolkit", "earthsci-toolkit-rs"]'
        elif git diff --name-only ${LAST_REF}..HEAD | grep -E '^packages/'; then
          echo "Changes detected in packages"
          NEEDS_RELEASE="true"

          # Detect which specific packages changed
          CHANGED_PACKAGES=$(git diff --name-only ${LAST_REF}..HEAD | \
            grep -E '^packages/' | \
            cut -d'/' -f2 | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')
        fi

        echo "needs_release=$NEEDS_RELEASE" >> $GITHUB_OUTPUT
        echo "changed_packages=$CHANGED_PACKAGES" >> $GITHUB_OUTPUT

        # Determine version bump type
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION_BUMP="${{ github.event.inputs.version_type }}"
        else
          # Auto-detect from commit messages
          COMMIT_MESSAGES=$(git log ${LAST_REF}..HEAD --oneline)
          if echo "$COMMIT_MESSAGES" | grep -i "BREAKING CHANGE\|!:"; then
            VERSION_BUMP="major"
          elif echo "$COMMIT_MESSAGES" | grep -i "^feat\|^feature"; then
            VERSION_BUMP="minor"
          else
            VERSION_BUMP="patch"
          fi
        fi

        echo "version_bump=$VERSION_BUMP" >> $GITHUB_OUTPUT
        echo "Version bump: $VERSION_BUMP"

        # Calculate new version
        LAST_VERSION=${LAST_TAG#v}
        IFS='.' read -ra VERSION_PARTS <<< "$LAST_VERSION"
        MAJOR=${VERSION_PARTS[0]:-0}
        MINOR=${VERSION_PARTS[1]:-0}
        PATCH=${VERSION_PARTS[2]:-0}

        case $VERSION_BUMP in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
          prerelease)
            PRERELEASE_TYPE="${{ github.event.inputs.prerelease_type }}"
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH-${PRERELEASE_TYPE}.1"
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "New prerelease version: $NEW_VERSION"
            # Check if the computed tag already exists
            if git tag -l "v$NEW_VERSION" | grep -q "v$NEW_VERSION"; then
              echo "::warning::Tag v$NEW_VERSION already exists — skipping release"
              echo "needs_release=false" >> $GITHUB_OUTPUT
            fi
            exit 0
            ;;
        esac

        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "New version: $NEW_VERSION"

        # Check if the computed tag already exists
        if git tag -l "v$NEW_VERSION" | grep -q "v$NEW_VERSION"; then
          echo "::warning::Tag v$NEW_VERSION already exists — skipping release"
          echo "needs_release=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Generate release notes
        cat > /tmp/release_notes.md << EOF
        # Release v$NEW_VERSION

        ## Changes since $LAST_TAG:

        $(git log ${LAST_REF}..HEAD --pretty=format:"- %s (%h)" --no-merges)

        ## Changed Packages:

        $(echo "$CHANGED_PACKAGES" | jq -r '.[]' | sed 's/^/- /')

        ## Package Versions:
        - Julia EarthSciSerialization.jl: v$NEW_VERSION
        - TypeScript earthsci-toolkit: v$NEW_VERSION
        - Python earthsci_toolkit: v$NEW_VERSION
        - Rust earthsci-toolkit: v$NEW_VERSION

        ## Installation:

        ### Quick Install (Binaries)
        \`\`\`bash
        curl -sSL https://github.com/${{ github.repository }}/releases/latest/download/update.sh | bash
        \`\`\`

        ### Package Managers
        \`\`\`bash
        # Julia
        using Pkg; Pkg.add("EarthSciSerialization")

        # TypeScript/JavaScript
        npm install earthsci-toolkit

        # Python
        pip install earthsci-toolkit

        # Rust
        cargo add earthsci-toolkit
        \`\`\`

        EOF

        # Encode release notes for GitHub output
        {
          echo 'release_notes<<EOF'
          cat /tmp/release_notes.md
          echo EOF
        } >> $GITHUB_OUTPUT

  # Security scan before release
  security-scan:
    needs: release-analysis
    runs-on: ubuntu-latest
    if: needs.release-analysis.outputs.needs_release == 'true'
    outputs:
      security_status: ${{ steps.security_check.outputs.status }}
      vulnerabilities_found: ${{ steps.security_check.outputs.vulnerabilities }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        pip install --upgrade pip
        pip install safety toml requests urllib3

    - name: Run pre-release security scan
      id: security_check
      run: |
        echo "Running pre-release security scan..."

        # Run security scanner
        python3 scripts/package-security-scanner.py \
          --config .security-config.json \
          --output pre-release-security-scan.json

        SCAN_EXIT_CODE=$?

        # Check for critical vulnerabilities
        CRITICAL_VULNS=$(python3 -c "
        import json
        try:
            with open('pre-release-security-scan.json', 'r') as f:
                data = json.load(f)
            critical_count = 0
            for pkg in data.get('packages', {}).values():
                for vuln in pkg.get('vulnerabilities', []):
                    if vuln.get('severity', '').lower() in ['critical', 'high']:
                        critical_count += 1
            print(critical_count)
        except:
            print(0)
        ")

        echo "Critical vulnerabilities found: $CRITICAL_VULNS"
        echo "vulnerabilities=$CRITICAL_VULNS" >> $GITHUB_OUTPUT

        if [ "$CRITICAL_VULNS" -gt 0 ]; then
          echo "status=blocked" >> $GITHUB_OUTPUT
          echo "❌ Release blocked due to $CRITICAL_VULNS critical vulnerabilities"
          exit 1
        else
          echo "status=passed" >> $GITHUB_OUTPUT
          echo "✅ Security scan passed, proceeding with release"
          exit 0
        fi

    - name: Upload security scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pre-release-security-scan-${{ github.run_id }}
        path: pre-release-security-scan.json
        retention-days: 90

  # Create the release and update package versions
  create-release:
    needs: [release-analysis, security-scan]
    runs-on: ubuntu-latest
    if: needs.release-analysis.outputs.needs_release == 'true' && needs.security-scan.outputs.security_status == 'passed'
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Update package versions
      run: |
        NEW_VERSION="${{ needs.release-analysis.outputs.new_version }}"

        # Update Julia Project.toml
        if [ -f "packages/EarthSciSerialization.jl/Project.toml" ]; then
          sed -i "s/version = \"[^\"]*\"/version = \"$NEW_VERSION\"/" packages/EarthSciSerialization.jl/Project.toml
        fi

        # Update TypeScript package.json
        if [ -f "packages/earthsci-toolkit/package.json" ]; then
          cd packages/earthsci-toolkit
          npm version $NEW_VERSION --no-git-tag-version
          cd ../..
        fi

        # Update Python pyproject.toml
        if [ -f "packages/earthsci_toolkit/pyproject.toml" ]; then
          sed -i "s/version = \"[^\"]*\"/version = \"$NEW_VERSION\"/" packages/earthsci_toolkit/pyproject.toml
        fi

        # Update Rust Cargo.toml
        if [ -f "packages/earthsci-toolkit-rs/Cargo.toml" ]; then
          sed -i "s/version = \"[^\"]*\"/version = \"$NEW_VERSION\"/" packages/earthsci-toolkit-rs/Cargo.toml
        fi

        # Update workspace.json with coordinated release info
        cat > workspace.json << EOF
        {
          "version": "$NEW_VERSION",
          "updated": "$(date -Iseconds)",
          "packages": {
            "julia": "v$NEW_VERSION",
            "typescript": "v$NEW_VERSION",
            "python": "v$NEW_VERSION",
            "rust": "v$NEW_VERSION"
          },
          "release_coordination": {
            "status": "releasing",
            "changed_packages": ${{ needs.release-analysis.outputs.changed_packages }},
            "workflow_run_id": "${{ github.run_id }}"
          }
        }
        EOF

    - name: Commit version updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Release v${{ needs.release-analysis.outputs.new_version }}" || exit 0

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.release-analysis.outputs.new_version }}
        release_name: Release v${{ needs.release-analysis.outputs.new_version }}
        body: ${{ needs.release-analysis.outputs.release_notes }}
        draft: false
        prerelease: ${{ contains(needs.release-analysis.outputs.new_version, '-') }}

    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
        tags: true

  # Note: package-specific publish jobs (npm, PyPI, crates.io, Julia registry,
  # Go module tagging) are no longer dispatched from here. They live in
  # release-publish.yml and fire automatically on the `release: published`
  # event emitted by the `create-release` job above (gt-567).

  # Build cross-platform binaries
  build-binaries:
    needs: [release-analysis, security-scan, create-release]
    if: needs.release-analysis.outputs.needs_release == 'true' && needs.security-scan.outputs.security_status == 'passed'
    uses: ./.github/workflows/binary-release.yml
    with:
      version: v${{ needs.release-analysis.outputs.new_version }}
    secrets: inherit

  # Run comprehensive conformance testing (reuses the consolidated workflow)
  run-conformance-tests:
    needs: [release-analysis, security-scan, create-release]
    if: needs.release-analysis.outputs.needs_release == 'true' && needs.security-scan.outputs.security_status == 'passed'
    uses: ./.github/workflows/conformance-testing.yml
    with:
      release_validation: true
      ref: v${{ needs.release-analysis.outputs.new_version }}
    secrets: inherit

  # Update release with final assets and status
  finalize-release:
    needs: [
      release-analysis,
      security-scan,
      create-release,
      build-binaries,
      run-conformance-tests
    ]
    runs-on: ubuntu-latest
    if: always() && needs.release-analysis.outputs.needs_release == 'true'
    steps:
    - uses: actions/checkout@v4

    - name: Update workspace status
      run: |
        NEW_VERSION="${{ needs.release-analysis.outputs.new_version }}"

        # Determine final release status
        RELEASE_STATUS="success"
        if [ "${{ needs.build-binaries.result }}" != "success" ] || \
           [ "${{ needs.run-conformance-tests.result }}" != "success" ]; then
          RELEASE_STATUS="partial"
        fi

        # Update workspace.json with final status
        cat > workspace.json << EOF
        {
          "version": "$NEW_VERSION",
          "updated": "$(date -Iseconds)",
          "packages": {
            "julia": "v$NEW_VERSION",
            "typescript": "v$NEW_VERSION",
            "python": "v$NEW_VERSION",
            "rust": "v$NEW_VERSION"
          },
          "release_coordination": {
            "status": "$RELEASE_STATUS",
            "completed": "$(date -Iseconds)",
            "workflow_run_id": "${{ github.run_id }}",
            "binaries_status": "${{ needs.build-binaries.result }}",
            "conformance_status": "${{ needs.run-conformance-tests.result }}"
          }
        }
        EOF

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add workspace.json
        git commit -m "Update release coordination status for v$NEW_VERSION" || exit 0
        git push || exit 0

    - name: Update release notes with final status
      uses: actions/github-script@v7
      env:
        RELEASE_NOTES: ${{ needs.release-analysis.outputs.release_notes }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const version = "${{ needs.release-analysis.outputs.new_version }}";
          let releaseId = "${{ needs.create-release.outputs.release_id }}";

          // If create-release was skipped, try to find the release by tag
          if (!releaseId) {
            const tag = `v${version}`;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
              releaseId = String(release.id);
              core.info(`Found existing release ${releaseId} for tag ${tag}`);
            } catch (e) {
              core.warning(`No release found for tag ${tag} and create-release was skipped. Skipping release notes update.`);
              return;
            }
          }

          // Build status summary
          const statusEmoji = {
            'success': '✅',
            'failure': '❌',
            'skipped': '⏭️',
            'cancelled': '🚫'
          };

          const binariesStatus = statusEmoji['${{ needs.build-binaries.result }}'] || '❓';
          const conformanceStatus = statusEmoji['${{ needs.run-conformance-tests.result }}'] || '❓';

          const originalBody = process.env.RELEASE_NOTES || '';

          const statusSection = `

          ## 🚀 Release Status

          | Component | Status |
          |-----------|--------|
          | Cross-Platform Binaries | ${binariesStatus} ${{ needs.build-binaries.result }} |
          | Conformance Tests | ${conformanceStatus} ${{ needs.run-conformance-tests.result }} |

          **Release Quality**: ${binariesStatus === '✅' && conformanceStatus === '✅' ? '🟢 Production Ready' : '🟡 Review Required'}

          ---

          📊 [View detailed pipeline logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          `;

          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: parseInt(releaseId),
            body: originalBody + statusSection
          });

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Release Pipeline Failed for v${{ needs.release-analysis.outputs.new_version }}`,
            body: `The automated release pipeline failed for version v${{ needs.release-analysis.outputs.new_version }}.

            **Workflow Run**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Status Summary**:
            - Binaries: ${{ needs.build-binaries.result }}
            - Conformance: ${{ needs.run-conformance-tests.result }}

            Please review the logs and re-run the failed components manually if needed.`,
            labels: ['release', 'ci/cd', 'bug']
          });