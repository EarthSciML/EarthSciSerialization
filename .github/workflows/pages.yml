name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'packages/**'
      - 'scripts/generate_docs.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as
# we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.131.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate API + example documentation
        run: python scripts/generate_docs.py --output docs/content/generated

      - name: Install Hugo extended
        run: |
          curl -sSL \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin hugo

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site with Hugo
        run: hugo --source docs --minify --destination public --baseURL "${{ steps.pages.outputs.base_url }}/"

      # Hugo emits root-relative hrefs of the form /EarthSciSerialization/...
      # because the GitHub-Pages baseURL has that path component. The local build
      # tree lives at docs/public/, so we stage it under a parent dir that mirrors
      # the deployed path layout. Lychee's --root-dir then resolves those hrefs to
      # real files.
      - name: Stage built site for link-checking
        run: |
          mkdir -p /tmp/lychee-root/EarthSciSerialization
          cp -r docs/public/. /tmp/lychee-root/EarthSciSerialization/

      - name: Link-check built site (internal links only)
        # v1 ships lychee 0.15.0 which lacks --root-dir; v2 ships 0.23.0 which supports it.
        uses: lycheeverse/lychee-action@v2
        with:
          # Restrict to internal links — exclude all external schemes so we don't
          # depend on third-party uptime in the deploy gate.
          args: >-
            --offline
            --no-progress
            --root-dir /tmp/lychee-root
            --exclude '^https?://'
            --exclude '^mailto:'
            '/tmp/lychee-root/EarthSciSerialization/**/*.html'
          fail: true
          format: detailed

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
