name: Schema Sync Check

on:
  push:
    branches: [ main ]
    paths:
      - 'esm-schema.json'
      - 'packages/*/src/esm-schema.json'
      - 'packages/*/data/esm-schema.json'
      - 'packages/*/src/*/data/esm-schema.json'
      - 'packages/*/pkg/*/esm-schema.json'
      - 'packages/*/package.json'
      - 'packages/*/pyproject.toml'
      - 'packages/*/Cargo.toml'
      - 'packages/*/Project.toml'
      - 'scripts/sync-schema.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'esm-schema.json'
      - 'packages/*/src/esm-schema.json'
      - 'packages/*/data/esm-schema.json'
      - 'packages/*/src/*/data/esm-schema.json'
      - 'packages/*/pkg/*/esm-schema.json'
      - 'packages/*/package.json'
      - 'packages/*/pyproject.toml'
      - 'packages/*/Cargo.toml'
      - 'packages/*/Project.toml'
      - 'scripts/sync-schema.sh'

jobs:
  check-schema-sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check schema copies and binding versions are in sync
      run: scripts/sync-schema.sh --check
