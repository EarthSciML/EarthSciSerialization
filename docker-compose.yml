version: '3.8'

services:
  julia-conformance:
    build:
      context: .
      dockerfile: docker/Dockerfile.julia
    container_name: esm-julia-conformance
    volumes:
      - ./conformance-results:/workspace/conformance-results
    environment:
      - JULIA_NUM_THREADS=auto
      - ESM_TEST_TIMEOUT=300
    cpus: '2.0'
    memory: 4G
    networks:
      - esm-testing
    healthcheck:
      test: ["CMD", "julia", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  typescript-conformance:
    build:
      context: .
      dockerfile: docker/Dockerfile.typescript
    container_name: esm-typescript-conformance
    volumes:
      - ./conformance-results:/workspace/conformance-results
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - ESM_TEST_TIMEOUT=300
    cpus: '2.0'
    memory: 4G
    networks:
      - esm-testing
    healthcheck:
      test: ["CMD", "node", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  python-conformance:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    container_name: esm-python-conformance
    volumes:
      - ./conformance-results:/workspace/conformance-results
    environment:
      - PYTHONPATH=/workspace/packages/earthsci_toolkit/src
      - ESM_TEST_TIMEOUT=300
      - PYTHONUNBUFFERED=1
    cpus: '2.0'
    memory: 4G
    networks:
      - esm-testing
    healthcheck:
      test: ["CMD", "python3", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  rust-conformance:
    build:
      context: .
      dockerfile: docker/Dockerfile.rust
    container_name: esm-rust-conformance
    volumes:
      - ./conformance-results:/workspace/conformance-results
    environment:
      - RUST_BACKTRACE=1
      - ESM_TEST_TIMEOUT=300
    cpus: '2.0'
    memory: 4G
    networks:
      - esm-testing
    healthcheck:
      test: ["CMD", "cargo", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  conformance-analyzer:
    image: python:3.11-bookworm
    container_name: esm-conformance-analyzer
    working_dir: /workspace
    volumes:
      - ./conformance-results:/workspace/conformance-results
      - ./scripts:/workspace/scripts
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - esm-testing
    depends_on:
      - julia-conformance
      - typescript-conformance
      - python-conformance
      - rust-conformance
    command: >
      bash -c "
        pip install matplotlib seaborn plotly pandas jinja2 &&
        python3 /workspace/scripts/compare-conformance-outputs.py
          --output-dir /workspace/conformance-results
          --languages julia typescript python rust
          --comparison-output /workspace/conformance-results/comparison/analysis.json
          --performance-analysis
          --detailed-diffs &&
        python3 /workspace/scripts/generate-conformance-report.py
          --analysis-file /workspace/conformance-results/comparison/analysis.json
          --output-file /workspace/conformance-results/reports/conformance_report_docker.html
          --include-performance-charts
          --detailed-analysis
      "

networks:
  esm-testing:
    driver: bridge